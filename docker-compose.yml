services:
  pastinometro:
    build: .
    image: pastinometro:latest
    container_name: pastinometro
    restart: unless-stopped
    # In produzione le porte NON vengono esposte sull'host:
    # Nginx Proxy Manager raggiunge il container via rete docker su pastinometro:8000.
    # Per test locale (senza NPM), decommenta la sezione ports.
    # ports:
    #   - "${PORT:-8000}:8000"
    expose:
      - "8000"
    networks:
      - proxy
    volumes:
      - ./data:/data
    environment:
      DATA_DIR: /data
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-gianoli.federico@gmail.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}

networks:
  proxy:
    external: true
    name: docker-stack_proxy
