services:
  pastinometro:
    build: .
    image: pastinometro:latest
    container_name: pastinometro
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      - ./data:/data
    environment:
      DATA_DIR: /data
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-gianoli.federico@gmail.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
