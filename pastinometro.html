<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Il Pastinòmetro · Padova</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,800;1,9..144,400&family=Inter+Tight:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet"/>
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<style>
  :root{
    --bg:#f3ede0;
    --bg-2:#ebe2cf;
    --ink:#2a1e14;
    --ink-soft:#5a4735;
    --paper:#faf4e6;
    --accent:#8b1e2e;      /* granato */
    --accent-2:#c38a3a;    /* ambra */
    --gold:#b07a2a;
    --line:#c9b896;
    --shadow: 0 2px 0 rgba(42,30,20,0.08), 0 10px 30px rgba(42,30,20,0.08);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%;background:var(--bg);color:var(--ink);font-family:'Inter Tight',system-ui,sans-serif;font-size:15px;line-height:1.45;-webkit-font-smoothing:antialiased}
  body{
    background:
      radial-gradient(1200px 800px at 90% -10%, rgba(195,138,58,0.15), transparent 60%),
      radial-gradient(900px 600px at -10% 110%, rgba(139,30,46,0.08), transparent 55%),
      var(--bg);
  }
  h1,h2,h3,h4{font-family:'Fraunces',serif;font-weight:600;letter-spacing:-0.01em;margin:0}
  h1{font-weight:800;font-variation-settings:"opsz" 144}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,textarea,select{font-family:inherit;font-size:inherit;color:inherit}

  /* Layout */
  #app{display:grid;grid-template-columns:420px 1fr;height:100vh;overflow:hidden}
  @media (max-width:860px){
    #app{grid-template-columns:1fr;grid-template-rows:auto 1fr}
    #map{min-height:45vh}
    #side{max-height:55vh}
  }

  /* Sidebar */
  #side{
    background:var(--paper);
    border-right:1px solid var(--line);
    display:flex;flex-direction:column;
    overflow:hidden;
    box-shadow: inset -24px 0 40px -40px rgba(42,30,20,0.4);
  }
  .hero{
    padding:22px 26px 16px;
    border-bottom:1px dashed var(--line);
    background:
      linear-gradient(180deg, rgba(176,122,42,0.08), transparent),
      var(--paper);
    position:relative;
  }
  .hero::before{
    content:"";position:absolute;left:26px;right:26px;top:10px;height:2px;
    background:repeating-linear-gradient(90deg, var(--ink) 0 4px, transparent 4px 8px);
    opacity:.2;
  }
  .kicker{
    font-family:'Fraunces',serif;font-style:italic;font-weight:500;
    font-size:12px;letter-spacing:.18em;text-transform:uppercase;
    color:var(--accent);margin-bottom:4px
  }
  .title{
    font-size:38px;line-height:.95;margin:4px 0 6px;
    font-variation-settings:"opsz" 144;
  }
  .title em{font-style:italic;color:var(--accent-2);font-weight:500}
  .sub{color:var(--ink-soft);font-size:13px;max-width:34ch}
  .sub b{color:var(--ink)}

  /* User bar */
  .userbar{
    display:flex;align-items:center;gap:10px;
    padding:10px 26px;border-bottom:1px solid var(--line);
    background:var(--bg-2);
    font-size:13px;
  }
  .avatar{
    width:30px;height:30px;border-radius:50%;
    background:var(--accent);color:var(--paper);
    display:grid;place-items:center;font-family:'Fraunces',serif;font-weight:600;
    font-size:14px;
    box-shadow:var(--shadow);
  }
  .userbar .who{flex:1;min-width:0}
  .userbar .who b{display:block;font-family:'Fraunces',serif;font-size:15px}
  .userbar .who span{color:var(--ink-soft);font-size:12px}
  .linkbtn{
    font-size:12px;color:var(--accent);text-decoration:underline;
    text-underline-offset:3px;text-decoration-color:var(--line);
    background:none;padding:4px 0;
  }
  .linkbtn:hover{text-decoration-color:var(--accent)}

  /* Controls */
  .controls{padding:14px 26px;border-bottom:1px solid var(--line)}
  .search{
    display:flex;align-items:center;gap:8px;
    background:var(--bg);
    border:1px solid var(--line);border-radius:999px;
    padding:8px 14px;
  }
  .search input{
    flex:1;border:none;background:none;outline:none;font-size:14px;
  }
  .search .ico{opacity:.6;font-size:14px}

  .chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
  .chip{
    font-size:11px;letter-spacing:.08em;text-transform:uppercase;
    padding:5px 11px;border-radius:999px;
    border:1px solid var(--line);background:var(--bg);color:var(--ink-soft);
    cursor:pointer;transition:all .15s;
    font-weight:500;
  }
  .chip:hover{border-color:var(--ink)}
  .chip.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .chip .dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:5px;vertical-align:middle}

  .sortrow{
    display:flex;justify-content:space-between;align-items:center;
    margin-top:10px;font-size:12px;color:var(--ink-soft);
  }
  .sortrow select{
    border:none;background:none;font-size:12px;color:var(--ink);
    font-weight:500;border-bottom:1px dotted var(--line);
    padding:2px 0;outline:none;
  }

  /* List */
  .list{flex:1;overflow-y:auto;padding:8px 0 80px}
  .list::-webkit-scrollbar{width:8px}
  .list::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px}

  .item{
    padding:14px 26px;border-bottom:1px solid rgba(201,184,150,0.4);
    cursor:pointer;position:relative;
    transition:background .12s;
  }
  .item:hover{background:rgba(176,122,42,0.05)}
  .item.active{background:rgba(139,30,46,0.06)}
  .item.active::before{
    content:"";position:absolute;left:0;top:14px;bottom:14px;width:3px;background:var(--accent)
  }
  .item-head{display:flex;justify-content:space-between;align-items:baseline;gap:10px}
  .item-name{font-family:'Fraunces',serif;font-size:18px;font-weight:500;line-height:1.15;color:var(--ink)}
  .item-cat{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);white-space:nowrap}
  .item-addr{font-size:12px;color:var(--ink-soft);margin-top:2px}
  .item-score{
    display:flex;align-items:center;gap:6px;margin-top:6px;font-size:12px;
  }
  .score-num{font-family:'Fraunces',serif;font-weight:600;font-size:15px;color:var(--accent)}
  .score-num.none{color:var(--ink-soft);font-style:italic;font-weight:400}
  .score-n{color:var(--ink-soft)}

  /* Map */
  #map{position:relative;height:100%;width:100%;background:var(--bg-2)}
  .maplibregl-popup{max-width:240px!important}
  .maplibregl-popup-content{
    background:var(--paper)!important;
    padding:10px 14px!important;
    border:1px solid var(--line)!important;
    border-radius:6px!important;
    font-family:'Inter Tight',sans-serif!important;
    box-shadow:var(--shadow)!important;
  }
  .maplibregl-popup-tip{border-top-color:var(--paper)!important;border-bottom-color:var(--paper)!important}
  .poptitle{font-family:'Fraunces',serif;font-size:16px;font-weight:500;margin-bottom:4px;color:var(--ink)}
  .popcat{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--accent)}
  .popbtn{
    margin-top:8px;font-size:12px;color:var(--accent);
    border:1px solid var(--accent);padding:4px 10px;border-radius:3px;
    background:var(--paper);
  }
  .popbtn:hover{background:var(--accent);color:var(--paper)}

  /* Map markers
     IMPORTANTE: l'elemento .mk e' posizionato da MapLibre via transform.
     Non aggiungere transition/transform su .mk: usare il wrapper interno .mk-body.
  */
  .mk{position:relative;cursor:pointer}
  .mk .mk-body{
    width:22px;height:22px;border-radius:50%;
    display:grid;place-items:center;
    border:2px solid var(--paper);
    box-shadow:0 2px 6px rgba(42,30,20,0.35);
    font-size:11px;
    position:relative;
    transition:transform .15s;
  }
  .mk:hover .mk-body{transform:scale(1.25)}
  .mk.bakery .mk-body{background:#c38a3a}
  .mk.pastry .mk-body{background:#8b1e2e}
  .mk.cafe   .mk-body{background:#5a4735}
  .mk.bar    .mk-body{background:#2a5d4a}
  .mk.rated  .mk-body{width:30px;height:30px;border-width:3px}
  .mk.rated  .mk-body::after{
    content:"";position:absolute;inset:-4px;border-radius:50%;
    border:1px solid currentColor;opacity:.4;pointer-events:none;
  }
  .mk .mk-body .badge{
    position:absolute;bottom:-6px;right:-6px;
    background:var(--paper);color:var(--ink);
    font-family:'Fraunces',serif;font-weight:600;font-size:10px;
    width:18px;height:18px;border-radius:50%;
    display:grid;place-items:center;
    box-shadow:0 1px 3px rgba(0,0,0,.3);
  }

  /* Floating legend */
  .legend{
    position:absolute;top:14px;right:14px;
    background:var(--paper);border:1px solid var(--line);
    border-radius:4px;padding:10px 14px;
    font-size:12px;box-shadow:var(--shadow);
    z-index:5;
  }
  .legend b{font-family:'Fraunces',serif;font-weight:600;display:block;margin-bottom:6px;font-size:13px}
  .legend .row{display:flex;align-items:center;gap:6px;margin:3px 0;color:var(--ink-soft)}
  .legend .sw{width:10px;height:10px;border-radius:50%;flex:none}

  /* Modal */
  .overlay{
    position:fixed;inset:0;background:rgba(42,30,20,0.55);
    display:grid;place-items:center;z-index:1000;
    padding:20px;
    backdrop-filter:blur(3px);
    animation:fadein .2s ease-out;
  }
  @keyframes fadein{from{opacity:0}to{opacity:1}}
  @keyframes slideup{from{transform:translateY(20px);opacity:0}to{transform:none;opacity:1}}
  .modal{
    background:var(--paper);border:1px solid var(--line);
    border-radius:4px;
    width:100%;max-width:580px;max-height:90vh;
    overflow-y:auto;
    box-shadow:0 30px 80px rgba(0,0,0,.3);
    animation:slideup .25s ease-out;
  }
  .modal-head{
    padding:22px 28px 14px;border-bottom:1px solid var(--line);
    position:relative;
  }
  .modal-head .kicker{margin-bottom:6px}
  .modal-head h2{font-size:26px;line-height:1.05}
  .modal-head .meta{margin-top:6px;font-size:13px;color:var(--ink-soft)}
  .closex{
    position:absolute;top:14px;right:14px;
    width:30px;height:30px;border-radius:50%;
    display:grid;place-items:center;font-size:18px;
    color:var(--ink-soft);
  }
  .closex:hover{background:var(--bg-2);color:var(--ink)}
  .modal-body{padding:20px 28px}

  /* Score ring */
  .score-wrap{display:flex;align-items:center;gap:16px;margin-bottom:18px;padding-bottom:18px;border-bottom:1px dashed var(--line)}
  .score-ring{
    width:86px;height:86px;border-radius:50%;
    background:conic-gradient(var(--accent) calc(var(--pct, 0) * 1%), var(--bg-2) 0);
    display:grid;place-items:center;position:relative;flex:none;
  }
  .score-ring::before{
    content:"";position:absolute;inset:8px;background:var(--paper);border-radius:50%;
  }
  .score-ring .n{position:relative;font-family:'Fraunces',serif;font-weight:600;font-size:24px;color:var(--accent)}
  .score-ring.none::before{background:var(--bg-2)}
  .score-ring.none .n{color:var(--ink-soft);font-size:13px;font-style:italic}
  .score-meta h4{font-size:15px;font-family:'Fraunces',serif;font-weight:500;margin-bottom:3px}
  .score-meta .bars{display:grid;grid-template-columns:1fr auto;gap:3px 10px;margin-top:6px;font-size:12px;color:var(--ink-soft)}
  .score-meta .bar{
    background:var(--bg-2);height:6px;border-radius:3px;overflow:hidden;position:relative;min-width:100px;align-self:center;
  }
  .score-meta .bar span{display:block;height:100%;background:var(--accent-2);border-radius:3px}

  /* Review form */
  .formbox{background:var(--bg);border:1px solid var(--line);border-radius:4px;padding:16px;margin-bottom:20px}
  .formbox h3{font-size:16px;margin-bottom:14px}
  .crit{margin-bottom:12px}
  .crit-label{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px}
  .crit-label b{font-weight:500}
  .crit-val{font-family:'Fraunces',serif;font-weight:600;color:var(--accent);font-size:15px}
  .slider{
    appearance:none;width:100%;height:5px;background:var(--bg-2);border-radius:3px;outline:none;
    cursor:pointer;
  }
  .slider::-webkit-slider-thumb{
    appearance:none;width:18px;height:18px;border-radius:50%;
    background:var(--accent);border:2px solid var(--paper);box-shadow:0 1px 3px rgba(0,0,0,.2);
    cursor:pointer;
  }
  .slider::-moz-range-thumb{
    width:18px;height:18px;border-radius:50%;
    background:var(--accent);border:2px solid var(--paper);
    cursor:pointer;
  }
  .textfield{
    width:100%;border:1px solid var(--line);background:var(--paper);
    border-radius:3px;padding:10px 12px;font-size:14px;
    resize:vertical;min-height:70px;outline:none;
    font-family:inherit;
  }
  .textfield:focus{border-color:var(--accent)}
  .photoinput{
    display:flex;gap:10px;align-items:center;margin-top:10px;flex-wrap:wrap;
  }
  .photoinput label{
    font-size:12px;border:1px dashed var(--line);padding:8px 12px;border-radius:3px;
    cursor:pointer;color:var(--ink-soft);
  }
  .photoinput label:hover{border-color:var(--accent);color:var(--accent)}
  .photoinput input[type=file]{display:none}
  .thumb{
    width:52px;height:52px;border-radius:3px;object-fit:cover;
    border:1px solid var(--line);
  }
  .btn-submit{
    background:var(--accent);color:var(--paper);
    padding:10px 22px;border-radius:3px;font-size:14px;font-weight:500;
    letter-spacing:.02em;margin-top:8px;
  }
  .btn-submit:hover{background:var(--ink)}
  .btn-submit:disabled{opacity:.5;cursor:not-allowed}

  /* Reviews list */
  .reviews h3{font-size:15px;margin-bottom:12px;color:var(--ink-soft);font-weight:500}
  .review{
    padding:14px 0;border-top:1px solid var(--line);
  }
  .review:first-child{border-top:none}
  .review-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
  .review-author{font-family:'Fraunces',serif;font-weight:500;font-size:15px}
  .review-author .av{
    display:inline-block;width:22px;height:22px;border-radius:50%;
    background:var(--accent-2);color:var(--paper);
    text-align:center;line-height:22px;font-size:11px;margin-right:7px;
    vertical-align:middle;
  }
  .review-score{font-family:'Fraunces',serif;font-weight:600;color:var(--accent);font-size:16px}
  .review-date{font-size:11px;color:var(--ink-soft);margin-left:8px}
  .review-crits{display:flex;gap:10px;font-size:11px;color:var(--ink-soft);margin:4px 0 6px;flex-wrap:wrap}
  .review-crits span b{color:var(--ink);font-family:'Fraunces',serif;font-weight:600}
  .review-body{font-size:13.5px;line-height:1.55;color:var(--ink);margin-top:4px}
  .review-photos{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
  .review-photos img{width:70px;height:70px;object-fit:cover;border-radius:3px;cursor:pointer;border:1px solid var(--line)}
  .delbtn{
    font-size:11px;color:var(--ink-soft);margin-top:6px;text-decoration:underline;
    text-underline-offset:2px;
  }
  .delbtn:hover{color:var(--accent)}

  /* Login modal */
  .login input{
    width:100%;padding:10px 12px;border:1px solid var(--line);
    background:var(--paper);border-radius:3px;margin-bottom:10px;outline:none;
  }
  .login input:focus{border-color:var(--accent)}
  .hint{font-size:12px;color:var(--ink-soft);margin-top:8px}
  .hint a{color:var(--accent);text-underline-offset:2px}
  .auth-tabs{display:flex;gap:4px;margin:4px 0 14px;border-bottom:1px solid var(--line)}
  .auth-tab{
    padding:8px 12px;font-size:12px;letter-spacing:.08em;text-transform:uppercase;
    background:none;color:var(--ink-soft);border-bottom:2px solid transparent;
    margin-bottom:-1px;font-weight:500;
  }
  .auth-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
  .auth-tab:hover{color:var(--ink)}
  .admin-badge{
    display:inline-block;font-size:10px;letter-spacing:.1em;text-transform:uppercase;
    background:var(--accent);color:var(--paper);padding:1px 6px;border-radius:2px;
    margin-left:6px;font-weight:600;vertical-align:middle;
  }
  /* Picker categoria */
  .cat-grid{
    display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:6px 0 10px;
  }
  .cat-pick{
    display:flex;align-items:center;gap:8px;
    padding:10px 12px;border:1px solid var(--line);border-radius:4px;
    background:var(--paper);text-align:left;cursor:pointer;
    font-family:inherit;font-size:13px;color:var(--ink);
    transition:border-color .12s, background .12s;
  }
  .cat-pick:hover:not([disabled]){border-color:var(--accent);background:var(--bg-2)}
  .cat-pick.sel{border-color:var(--accent);background:var(--bg-2);color:var(--ink-soft)}
  .cat-pick[disabled]{opacity:.55;cursor:not-allowed}
  .cat-pick .ico{font-size:18px;line-height:1}

  /* Ranking tab */
  .rankbtn{
    padding:8px 14px;font-size:12px;letter-spacing:.12em;text-transform:uppercase;
    background:var(--ink);color:var(--paper);border-radius:3px;font-weight:500;
  }
  .rankbtn:hover{background:var(--accent)}

  .addbtn{
    margin-top:12px;width:100%;
    padding:10px 14px;font-size:12px;letter-spacing:.06em;
    background:var(--paper);color:var(--accent);
    border:1px dashed var(--accent);border-radius:3px;
    font-family:'Fraunces',serif;font-style:italic;font-weight:500;
    transition:all .15s;
  }
  .addbtn:hover{background:var(--accent);color:var(--paper);border-style:solid}

  /* Map picker mode */
  #map.picking{cursor:crosshair}
  #map.picking::after{
    content:"clicca sulla mappa per posizionare il luogo · ESC per annullare";
    position:absolute;top:14px;left:50%;transform:translateX(-50%);
    background:var(--ink);color:var(--paper);
    padding:8px 16px;border-radius:3px;font-size:13px;
    font-family:'Fraunces',serif;font-style:italic;
    z-index:10;box-shadow:var(--shadow);
    pointer-events:none;
    animation:slideup .25s ease-out;
  }
  /* Picker marker — anche qui l'esterno resta neutro, animazioni sull'interno */
  .pickmarker{position:relative;pointer-events:none}
  .pickmarker .pin{
    width:30px;height:30px;border-radius:50% 50% 50% 0;
    background:var(--accent);transform:rotate(-45deg);
    border:3px solid var(--paper);
    box-shadow:0 4px 10px rgba(0,0,0,.3);
    animation:bounce .5s ease-out;
  }
  @keyframes bounce{
    0%{transform:rotate(-45deg) scale(0)}
    60%{transform:rotate(-45deg) scale(1.2)}
    100%{transform:rotate(-45deg) scale(1)}
  }

  /* Marker custom (user-added) */
  .mk.custom .mk-body{
    background-image:linear-gradient(135deg, currentColor 50%, transparent 50%);
  }
  .mk.custom .mk-body::before{
    content:"✱";position:absolute;top:-3px;right:-3px;
    color:var(--ink);background:var(--paper);
    width:12px;height:12px;border-radius:50%;
    font-size:9px;display:grid;place-items:center;
    line-height:1;font-weight:bold;
    box-shadow:0 1px 2px rgba(0,0,0,.3);
  }

  /* Add place form */
  .field{margin-bottom:14px}
  .field label{
    display:block;font-size:12px;font-weight:500;color:var(--ink-soft);
    margin-bottom:4px;letter-spacing:.04em;
  }
  .field label .req{color:var(--accent)}
  .field input[type=text], .field input[type=tel], .field input[type=url], .field textarea, .field select{
    width:100%;padding:9px 12px;border:1px solid var(--line);
    background:var(--paper);border-radius:3px;outline:none;
    font-size:14px;font-family:inherit;
  }
  .field input:focus, .field textarea:focus, .field select:focus{border-color:var(--accent)}
  .field .hint{font-size:11px;color:var(--ink-soft);margin-top:3px;font-style:italic}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media (max-width:520px){.field-row{grid-template-columns:1fr}}
  .coord-display{
    display:flex;align-items:center;gap:10px;
    padding:10px 12px;background:var(--bg);border:1px solid var(--line);border-radius:3px;
    font-family:'Fraunces',serif;font-size:13px;
  }
  .coord-display.empty{color:var(--ink-soft);font-style:italic}
  .coord-display b{color:var(--accent);font-variant-numeric:tabular-nums}
  .pickbtn{
    background:var(--ink);color:var(--paper);
    padding:6px 12px;border-radius:3px;font-size:12px;
    letter-spacing:.04em;font-weight:500;
  }
  .pickbtn:hover{background:var(--accent)}
  .dup-warn{
    background:rgba(176,122,42,0.12);
    border-left:3px solid var(--gold);
    padding:10px 14px;margin:10px 0;border-radius:3px;
    font-size:13px;
  }
  .dup-warn b{font-family:'Fraunces',serif;font-weight:600}
  .dup-warn .nearby{font-size:12px;color:var(--ink-soft);margin-top:4px}
  .added-by{
    font-size:11px;color:var(--ink-soft);font-style:italic;
    margin-top:4px;
  }
  .added-by .you{color:var(--accent);font-weight:500;font-style:normal}
  .podium{display:grid;gap:10px;margin-bottom:16px}
  .rank-item{
    display:grid;grid-template-columns:40px 1fr auto;gap:14px;
    padding:14px;border:1px solid var(--line);border-radius:3px;
    align-items:center;background:var(--bg);cursor:pointer;
  }
  .rank-item:hover{border-color:var(--accent)}
  .rank-n{font-family:'Fraunces',serif;font-weight:800;font-size:28px;color:var(--accent);text-align:center;font-variation-settings:"opsz" 144}
  .rank-n.gold{color:var(--gold)}
  .rank-info b{font-family:'Fraunces',serif;font-weight:500;font-size:17px;display:block}
  .rank-info span{font-size:12px;color:var(--ink-soft)}
  .rank-score{font-family:'Fraunces',serif;font-weight:600;font-size:20px;color:var(--accent)}
  .rank-score span{font-size:11px;color:var(--ink-soft);font-family:'Inter Tight';font-weight:400;display:block;text-align:right}

  /* Empty states */
  .empty{padding:40px 26px;text-align:center;color:var(--ink-soft);font-style:italic;font-family:'Fraunces',serif}
  .empty::before{content:"◦ ◦ ◦";display:block;margin-bottom:10px;letter-spacing:8px;color:var(--line)}

  /* Tabs in modal */
  .tabs{display:flex;border-bottom:1px solid var(--line);margin-bottom:16px;gap:4px}
  .tab{
    padding:8px 14px;font-size:12px;letter-spacing:.1em;text-transform:uppercase;
    color:var(--ink-soft);border-bottom:2px solid transparent;margin-bottom:-1px;
    cursor:pointer;font-weight:500;
  }
  .tab.active{color:var(--ink);border-bottom-color:var(--accent)}

  /* Toast */
  .toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
    background:var(--ink);color:var(--paper);padding:10px 20px;border-radius:3px;
    font-size:13px;box-shadow:var(--shadow);z-index:2000;
    animation:slideup .25s ease-out;
  }

  /* Image viewer */
  .imgview{
    position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:3000;
    display:grid;place-items:center;padding:20px;cursor:pointer;
  }
  .imgview img{max-width:100%;max-height:100%;object-fit:contain}

  /* === FILTRO PASTINA === */
  .pastry-filter-row{
    display:flex;align-items:center;gap:10px;margin-top:8px;
    font-size:12px;color:var(--ink-soft);
  }
  .pastry-filter-row select{
    flex:1;border:none;background:none;font-size:12px;color:var(--ink);
    font-weight:500;border-bottom:1px dotted var(--line);padding:2px 0;outline:none;
    font-family:inherit;
  }
  .pastry-filter-row select:focus{border-bottom-color:var(--accent)}
  .pastry-filter-row.active{color:var(--accent)}
  .pastry-filter-row.active select{border-bottom-color:var(--accent);color:var(--accent)}

  .pastry-select{
    width:100%;padding:9px 12px;border:1px solid var(--line);
    background:var(--paper);border-radius:3px;outline:none;
    font-size:14px;font-family:inherit;
  }

  /* === MATRICE DISPONIBILITÀ === */
  .avail-grid{
    background:var(--bg);border:1px solid var(--line);border-radius:3px;
    margin-bottom:18px;overflow:hidden;
  }
  .avail-head{
    padding:14px 16px 8px;border-bottom:1px solid var(--line);
    background:linear-gradient(180deg, rgba(176,122,42,0.08), transparent);
  }
  .avail-head h3{font-size:16px;font-family:'Fraunces',serif;font-weight:500;margin-bottom:2px}
  .avail-sub{font-size:12px;color:var(--ink-soft);font-style:italic;margin:0}

  .avail-row{
    display:flex;align-items:center;gap:10px;
    padding:10px 14px;border-bottom:1px solid rgba(201,184,150,0.4);
    transition:background .12s;
  }
  .avail-row:last-of-type{border-bottom:none}
  .avail-row:hover{background:rgba(176,122,42,0.04)}
  .avail-left{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
  .avail-emoji{font-size:22px;flex:none;width:28px;text-align:center}
  .avail-info{flex:1;min-width:0}
  .avail-info b{
    font-family:'Fraunces',serif;font-weight:500;font-size:15px;
    color:var(--ink);display:block;line-height:1.2;
  }
  .avail-info > span{
    display:block;font-size:11px;color:var(--ink-soft);
    line-height:1.35;margin-top:2px;
  }
  .avail-info .avail-by{
    font-style:italic;color:var(--gold);font-size:10.5px;margin-top:2px;display:block;
  }
  .avail-custom{color:var(--accent);font-size:11px;letter-spacing:.5px;font-weight:500;margin-left:2px}
  .avail-rating{
    font-family:'Fraunces',serif;font-weight:600;color:var(--accent);
    font-size:14px;flex:none;padding-right:6px;text-align:right;
  }
  .avail-rating span{
    font-size:10px;color:var(--ink-soft);font-family:'Inter Tight';font-weight:400;
    margin-left:1px;
  }
  .avail-toggles{display:flex;gap:3px;flex:none;align-items:center}
  .avail-btn{
    width:28px;height:28px;border-radius:3px;
    border:1px solid var(--line);background:var(--paper);
    font-size:14px;font-weight:600;
    display:grid;place-items:center;
    transition:all .12s;
    color:var(--ink-soft);cursor:pointer;
  }
  .avail-btn:hover{border-color:var(--ink);color:var(--ink)}
  .avail-btn.yes.on{background:#2a5d4a;border-color:#2a5d4a;color:#fff}
  .avail-btn.no.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .avail-btn.unk.on{background:var(--ink-soft);border-color:var(--ink-soft);color:#fff}
  .avail-del{
    width:24px;height:28px;font-size:12px;background:none;
    color:var(--ink-soft);margin-left:4px;cursor:pointer;
    border-radius:3px;border:none;
  }
  .avail-del:hover{color:var(--accent);background:rgba(139,30,46,0.1)}

  .avail-addrow{
    padding:10px 14px;border-top:1px dashed var(--line);
    background:rgba(176,122,42,0.04);
  }
  .addpastrybtn{
    width:100%;padding:7px 12px;font-size:12px;
    background:none;color:var(--accent);
    border:1px dashed var(--accent);border-radius:3px;
    font-family:'Fraunces',serif;font-style:italic;
    transition:all .15s;cursor:pointer;
  }
  .addpastrybtn:hover{background:var(--accent);color:var(--paper);border-style:solid}

  /* Blocchi recensioni raggruppate per pastina */
  .pastry-block{
    margin-bottom:18px;padding-bottom:6px;
  }
  .pastry-block:last-child{margin-bottom:0}
  .pastry-block-head{
    display:flex;align-items:baseline;gap:10px;
    padding:6px 0 6px;margin-bottom:4px;
    border-bottom:2px solid var(--line);
  }
  .pastry-block-head h4{
    font-family:'Fraunces',serif;font-weight:500;font-size:17px;flex:1;
  }
  .pastry-block-avg{
    font-family:'Fraunces',serif;font-weight:600;color:var(--accent);font-size:15px;
  }
  .pastry-block-avg span{
    font-size:11px;color:var(--ink-soft);font-family:'Inter Tight';font-weight:400;
  }
</style>
</head>

// ====== STORAGE (backend KV via /api/kv) ======
const API = ""; // stessa origine
async function _api(path, opts={}){
  const r = await fetch(API + path, {
    credentials: "include",
    headers: opts.body ? {"Content-Type":"application/json"} : undefined,
    ...opts,
  });
  return r;
}
async function sget(k, shared=false){
  try{
    const r = await _api(`/api/kv?key=${encodeURIComponent(k)}&shared=${shared}`);
    if(!r.ok) return null;
    const j = await r.json();
    return JSON.parse(j.value);
  }catch(e){ return null }
}
async function sset(k, v, shared=false){
  try{
    const r = await _api(`/api/kv?key=${encodeURIComponent(k)}&shared=${shared}`, {
      method:"PUT",
      body: JSON.stringify({value: JSON.stringify(v)}),
    });
    if(!r.ok){
      if(r.status === 401){ toast("Sessione scaduta — accedi di nuovo"); showLogin(); }
      else if(r.status === 413){ toast("File troppo grande (max 6 MB)"); }
      else{ console.warn("storage set failed", r.status); }
      return false;
    }
    return true;
  }catch(e){ console.warn("storage set failed", e); return false }
}
async function slist(prefix, shared=false){
  try{
    const r = await _api(`/api/kv/list?prefix=${encodeURIComponent(prefix)}&shared=${shared}`);
    if(!r.ok) return [];
    const j = await r.json();
    return j.keys || [];
  }catch(e){ return [] }
}
async function sscan(prefix, shared=false){
  // ritorna [{key, value: parsedObj}] in una sola chiamata
  try{
    const r = await _api(`/api/kv/scan?prefix=${encodeURIComponent(prefix)}&shared=${shared}`);
    if(!r.ok) return [];
    const j = await r.json();
    const out = [];
    for(const it of (j.items || [])){
      try{ out.push({key: it.key, value: JSON.parse(it.value)}); }
      catch(_){}
    }
    return out;
  }catch(e){ return [] }
}
async function sdel(k, shared=false){
  try{
    const r = await _api(`/api/kv?key=${encodeURIComponent(k)}&shared=${shared}`, {method:"DELETE"});
    return r.ok;
  }catch(e){ return false }
}

// ====== UTENTE: login username + password (backend FastAPI) ======
async function loadUser(){
  try{
    const r = await _api("/api/auth/me");
    if(r.ok){
      const j = await r.json();
      if(j.user){
        STATE.currentUser = {
          id: j.user.id,
          name: j.user.username,
          email: j.user.email,
          isAdmin: !!j.user.isAdmin,
        };
      }
    }
  }catch(e){}
  renderUserbar();
}
async function loginWithPassword(username, password){
  const r = await _api("/api/auth/login", {
    method:"POST",
    body: JSON.stringify({username, password}),
  });
  if(!r.ok){
    const msg = r.status === 401 ? "Username o password errati" : "Errore di accesso";
    toast(msg);
    return false;
  }
  const u = await r.json();
  STATE.currentUser = {id: u.id, name: u.username, email: u.email, isAdmin: !!u.isAdmin};
  renderUserbar();
  toast("Benvenuto, " + u.username);
  return true;
}
async function registerWithPassword(username, password, email){
  const r = await _api("/api/auth/register", {
    method:"POST",
    body: JSON.stringify({username, password, email: email || null}),
  });
  if(!r.ok){
    let msg = "Errore in registrazione";
    try{ const j = await r.json(); if(j.detail) msg = j.detail }catch(_){}
    toast(msg);
    return false;
  }
  const u = await r.json();
  STATE.currentUser = {id: u.id, name: u.username, email: u.email, isAdmin: !!u.isAdmin};
  renderUserbar();
  toast("Account creato. Benvenuto, " + u.username);
  return true;
}
async function logout(){
  try{ await _api("/api/auth/logout", {method:"POST"}); }catch(_){}
  STATE.currentUser = null;
  renderUserbar();
  toast("Sei uscito.");
}

function renderUserbar(){
  const el = document.getElementById("userbar");
  if(STATE.currentUser){
    const n = STATE.currentUser.name;
    const init = n.slice(0,1).toUpperCase();
    const adminBadge = STATE.currentUser.isAdmin ? `<span class="admin-badge">admin</span>` : "";
    el.innerHTML = `
      <div class="avatar">${init}</div>
      <div class="who"><b>${escapeHtml(n)}${adminBadge}</b><span>profilo recensore</span></div>
      <button class="linkbtn" onclick="showMyReviews()">le mie recensioni</button>
      <button class="linkbtn" onclick="logout()">esci</button>
    `;
  }else{
    el.innerHTML = `
      <div class="avatar" style="background:var(--bg-2);color:var(--ink-soft)">?</div>
      <div class="who"><b>Ospite</b><span>accedi per recensire</span></div>
      <button class="linkbtn" onclick="showLogin()">entra</button>
    `;
  }
}

function showLogin(mode){
  mode = mode || "login";
  const isLogin = mode === "login";
  const html = `
    <div class="login">
      <div class="kicker">${isLogin ? "Accesso" : "Nuovo account"}</div>
      <h2 style="font-size:24px;margin:6px 0 6px">${isLogin ? "Bentornato" : "Crea il tuo account"}</h2>
      <p class="hint" style="margin-bottom:14px">${isLogin
        ? "Inserisci username e password per firmare le tue recensioni."
        : "Username + password. L'email è facoltativa, serve solo se vuoi recuperare l'account."}</p>
      <div class="auth-tabs">
        <button class="auth-tab ${isLogin?'active':''}" onclick="showLogin('login')">Entra</button>
        <button class="auth-tab ${!isLogin?'active':''}" onclick="showLogin('register')">Crea account</button>
      </div>
      <input id="auth-username" placeholder="username" autocomplete="username" autofocus />
      <input id="auth-password" type="password" placeholder="password" autocomplete="${isLogin?'current-password':'new-password'}" />
      ${isLogin ? "" : `<input id="auth-email" type="email" placeholder="email (facoltativa)" autocomplete="email" />`}
      <button class="btn-submit" onclick="doAuth('${mode}')">${isLogin ? "Entra" : "Crea account"}</button>
      <p class="hint">${isLogin
        ? "Non hai ancora un account? <a href=\"#\" onclick=\"event.preventDefault();showLogin('register')\">Creane uno</a>."
        : "Hai già un account? <a href=\"#\" onclick=\"event.preventDefault();showLogin('login')\">Accedi</a>."}</p>
    </div>
  `;
  openModal(html);
  setTimeout(()=>{
    const u = document.getElementById("auth-username");
    if(u) u.focus();
    const p = document.getElementById("auth-password");
    if(p) p.addEventListener("keydown", e=>{ if(e.key==="Enter") doAuth(mode); });
    if(u) u.addEventListener("keydown", e=>{ if(e.key==="Enter"){ if(p) p.focus(); }});
  },50);
}
async function doAuth(mode){
  const username = (document.getElementById("auth-username")||{}).value || "";
  const password = (document.getElementById("auth-password")||{}).value || "";
  const emailEl = document.getElementById("auth-email");
  const email = emailEl ? emailEl.value : "";
  if(!username.trim()){ toast("Username obbligatorio"); return }
  if(!password){ toast("Password obbligatoria"); return }
  if(mode !== "login" && password.length < 6){ toast("La password deve avere almeno 6 caratteri"); return }
  const ok = mode === "login"
    ? await loginWithPassword(username.trim(), password)
    : await registerWithPassword(username.trim(), password, email.trim());
  if(ok) closeModal();
}

// ====== RECENSIONI ======
// key: review:<placeId>:<reviewId>  valore: {id, placeId, userId, userName, crits:{}, score, text, photos:[dataURLs], ts}
async function loadReviews(){
  const items = await sscan("review:", true);
  const arr = items.map(it=>it.value).filter(Boolean);
  STATE.allReviews = arr;
  STATE.reviewsByPlace = arr.reduce((m,r)=>{ (m[r.placeId] = m[r.placeId] || []).push(r); return m },{});
  // ordina: più recenti prima
  for(const pid in STATE.reviewsByPlace){
    STATE.reviewsByPlace[pid].sort((a,b)=>b.ts-a.ts);
  }
  if(typeof populatePastryFilter === "function") populatePastryFilter();
}
async function saveReview(placeId, data){
  if(!STATE.currentUser){ showLogin(); return }
  const id = "r_" + Date.now().toString(36) + Math.random().toString(36).slice(2,6);
  const rev = {
    id, placeId,
    pastryKey: data.pastryKey,
    userId: STATE.currentUser.id,
    userName: STATE.currentUser.name,
    crits: data.crits,
    score: data.score,
    text: data.text || "",
    photos: data.photos || [],
    ts: Date.now(),
  };
  const key = `review:${placeId}:${id}`;
  const ok = await sset(key, rev, true);
  if(!ok){ toast("Errore: recensione non salvata (forse foto troppo pesanti)"); return false }
  // se l'utente ha recensito una pastina qui, di fatto sta dichiarando che è disponibile
  await setAvailability(placeId, data.pastryKey, "yes", {silent:true});
  await loadReviews();
  return true;
}
async function deleteReview(rev){
  if(!STATE.currentUser || rev.userId !== STATE.currentUser.id){ toast("Non puoi cancellare questa recensione"); return }
  if(!confirm("Eliminare la tua recensione?")) return;
  await sdel(`review:${rev.placeId}:${rev.id}`, true);
  await loadReviews();
  toast("Recensione eliminata");
  if(STATE.selected && STATE.selected.id === rev.placeId) openPlace(STATE.selected);
  else { renderList(); refreshMarkers() }
}

// statistiche complessive di un locale (media di tutte le pastine recensite)
function placeStats(placeId){
  const revs = STATE.reviewsByPlace[placeId] || [];
  if(!revs.length) return {avg:null, n:0, crits:{}, byPastry:{}};
  let sum = 0;
  const critSums = {};
  for(const c of CRITERIA) critSums[c.key] = 0;
  // raggruppa per pastina
  const byPastry = {};
  for(const r of revs){
    sum += r.score;
    for(const c of CRITERIA) critSums[c.key] += (r.crits?.[c.key] || 0);
    const pk = r.pastryKey || "_legacy";
    (byPastry[pk] = byPastry[pk] || []).push(r);
  }
  const crits = {};
  for(const c of CRITERIA) crits[c.key] = critSums[c.key]/revs.length;
  // media per pastina
  const pastryAvg = {};
  for(const pk in byPastry){
    const arr = byPastry[pk];
    pastryAvg[pk] = {n: arr.length, avg: arr.reduce((a,b)=>a+b.score,0)/arr.length};
  }
  return {avg:sum/revs.length, n:revs.length, crits, byPastry: pastryAvg};
}

// ====== PASTINE: default + custom ======
function allPastries(){
  return [...DEFAULT_PASTRIES, ...STATE.customPastries];
}
function getPastry(key){
  return allPastries().find(p=>p.key===key);
}

async function loadCustomPastries(){
  const items = await sscan("pastry:", true);
  const arr = items.map(it=>it.value).filter(p=>p && p.key);
  arr.sort((a,b)=>(a.ts||0)-(b.ts||0));
  STATE.customPastries = arr;
}

async function addCustomPastry(name, desc){
  if(!STATE.currentUser){ showLogin(); return null }
  name = (name||"").trim();
  if(!name) return null;
  const key = "u_" + name.toLowerCase()
    .replace(/[àáâãä]/g,"a").replace(/[èéêë]/g,"e").replace(/[ìíîï]/g,"i")
    .replace(/[òóôõö]/g,"o").replace(/[ùúûü]/g,"u")
    .replace(/[^a-z0-9]+/g,"_").replace(/^_+|_+$/g,"").slice(0,30);
  // controllo duplicati
  if(allPastries().some(p=>p.key===key || p.name.toLowerCase() === name.toLowerCase())){
    toast(`"${name}" esiste già nell'elenco`);
    return null;
  }
  const pastry = {
    key, name,
    emoji: "✨",
    desc: (desc||"").trim(),
    addedBy: {id:STATE.currentUser.id, name:STATE.currentUser.name},
    ts: Date.now(),
    custom: true,
  };
  const ok = await sset("pastry:"+key, pastry, true);
  if(!ok){ toast("Errore nel salvataggio"); return null }
  await loadCustomPastries();
  if(typeof populatePastryFilter === "function") populatePastryFilter();
  return pastry;
}

async function deleteCustomPastry(key){
  const p = STATE.customPastries.find(x=>x.key===key);
  if(!p) return;
  if(!STATE.currentUser || STATE.currentUser.id !== p.addedBy?.id){
    toast("Solo chi l'ha aggiunta può eliminarla"); return;
  }
  // controlla se in uso
  const inUseReviews = STATE.allReviews.filter(r=>r.pastryKey===key);
  const inUseAvail = Object.values(STATE.availability).filter(a=>a[key]).length;
  if(inUseReviews.length > 0){
    toast(`Non posso eliminare: ${inUseReviews.length} recensioni la usano`);
    return;
  }
  if(!confirm(`Eliminare "${p.name}" dall'elenco delle pastine?${inUseAvail?` (${inUseAvail} segnalazioni di disponibilità andranno perse)`:''}`)) return;
  await sdel("pastry:"+key, true);
  // rimuovi anche le segnalazioni
  for(const pid in STATE.availability){
    if(STATE.availability[pid][key]){
      const allKey = `avail:${pid}:${key}`;
      await sdel(allKey, true);
    }
  }
  await loadCustomPastries();
  await loadAvailability();
  toast("Pastina eliminata");
}

// key: avail:<placeId>:<pastryKey>  valore: {placeId, pastryKey, state:"yes"|"no"|"unknown", userId, userName, ts}
async function loadAvailability(){
  const items = await sscan("avail:", true);
  const map = {};
  for(const it of items){
    const a = it.value;
    if(a && a.placeId && a.pastryKey){
      (map[a.placeId] = map[a.placeId] || {})[a.pastryKey] = a;
    }
  }
  STATE.availability = map;
}

async function setAvailability(placeId, pastryKey, state, opts={}){
  if(!STATE.currentUser){
    if(!opts.silent) showLogin();
    return false;
  }
  const a = {
    placeId, pastryKey, state,
    userId: STATE.currentUser.id,
    userName: STATE.currentUser.name,
    ts: Date.now(),
  };
  const key = `avail:${placeId}:${pastryKey}`;
  if(state === "unknown"){
    await sdel(key, true);
  }else{
    const ok = await sset(key, a, true);
    if(!ok){ toast("Errore nel salvataggio"); return false }
  }
  await loadAvailability();
  if(typeof populatePastryFilter === "function") populatePastryFilter();
  if(!opts.silent) toast("Segnalazione salvata");
  return true;
}

function getAvailability(placeId, pastryKey){
  return STATE.availability[placeId]?.[pastryKey];
}

// ====== LUOGHI AGGIUNTI DAGLI UTENTI ======
// key: place:<id>  valore: {id, name, lat, lon, category, address, phone, website, hours, addedBy:{id,name}, ts, source:"user"}
async function loadCustomPlaces(){
  const items = await sscan("place:", true);
  const customs = items.map(it=>it.value).filter(p => p && p.id);
  // rimuove eventuali precedenti custom da PLACES e li rimette
  PLACES = PLACES.filter(p => p.source === "osm").concat(customs);
  applyCategoryOverrides();
}

// ====== OVERRIDE CATEGORIA ======
// key: cat:<placeId>  valore: {placeId, category, userId, userName, ts}
// Permette agli utenti di correggere la categoria di un POI (last-write-wins).
async function loadCategoryOverrides(){
  const items = await sscan("cat:", true);
  const map = {};
  for(const it of items){
    const o = it.value;
    if(o && o.placeId && o.category) map[o.placeId] = o;

  STATE.categoryOverrides = map;
  applyCategoryOverrides();
}
function applyCategoryOverrides(){

// distanza approssimata in metri (formula equirettangolare)
function distMeters(lat1, lon1, lat2, lon2){
  const R = 6371000;
  const dLat = (lat2-lat1) * Math.PI/180;
  const dLon = (lon2-lon1) * Math.PI/180;
  const a = (lat1+lat2)/2 * Math.PI/180;
  return Math.sqrt((dLat*R)**2 + (dLon*R*Math.cos(a))**2);
}

function findNearbyDuplicates(name, lat, lon, radiusM=120){
  const nameLower = name.toLowerCase().trim();
  if(!nameLower || lat==null) return [];
  const out = [];
  for(const p of PLACES){
    const d = distMeters(lat, lon, p.lat, p.lon);
    if(d > radiusM) continue;
    const pname = p.name.toLowerCase();
    // match per nome simile o per prossimità < 30m
    const nameMatch = pname.includes(nameLower) || nameLower.includes(pname) || levenshtein(pname, nameLower) <= 3;
    if(nameMatch || d < 30) out.push({p, d});
  }
  return out.sort((a,b)=>a.d-b.d).slice(0,4);
}

function levenshtein(a, b){
  if(a.length===0) return b.length;
  if(b.length===0) return a.length;
  const m = Array.from({length:a.length+1},(_,i)=>[i]);
  for(let j=1;j<=b.length;j++) m[0][j] = j;
  for(let i=1;i<=a.length;i++) for(let j=1;j<=b.length;j++)
    m[i][j] = a[i-1]===b[j-1] ? m[i-1][j-1] : 1+Math.min(m[i-1][j-1],m[i][j-1],m[i-1][j]);
  return m[a.length][b.length];
}

async function saveCustomPlace(data){
  if(!STATE.currentUser){ showLogin(); return null }
  const id = "u_" + Date.now().toString(36) + Math.random().toString(36).slice(2,5);
  const place = {
    id,
    name: data.name.trim(),

    phone: (data.phone||"").trim(),

    hours: (data.hours||"").trim(),

    ts: Date.now(),
    source: "user",
  };
  const ok = await sset("place:"+id, place, true);
  if(!ok){ toast("Errore: luogo non salvato"); return null }
  await loadCustomPlaces();

async function deleteCustomPlace(p){
  if(!STATE.currentUser){ toast("Devi essere loggato"); return }
  if(p.source !== "user"){ toast("Non è possibile eliminare i luoghi OSM"); return }
  if(p.addedBy?.id !== STATE.currentUser.id){ toast("Solo chi l'ha aggiunto può eliminarlo"); return }
  const revs = STATE.reviewsByPlace[p.id] || [];
  if(revs.length > 0){
    if(!confirm(`Questo luogo ha ${revs.length} recensione/i. Eliminandolo, anche le recensioni verranno rimosse. Procedere?`)) return;
    for(const r of revs) await sdel(`review:${p.id}:${r.id}`, true);
  }else{
    if(!confirm("Eliminare questo luogo?")) return;
  }
  await sdel("place:"+p.id, true);
  await loadCustomPlaces();
  await loadReviews();
  closeModal();
  refreshMarkers();
  renderList();
  toast("Luogo eliminato");
}

// ====== RENDERING LISTA ======
function filteredPlaces(){
  const q = STATE.query.toLowerCase().trim();
  let out = PLACES.filter(p=>{
    if(STATE.filter !== "all" && p.category !== STATE.filter) return false;
    if(STATE.pastryFilter){
      // mostra solo locali dove questa pastina è marcata "yes" o ha recensioni
      const a = getAvailability(p.id, STATE.pastryFilter);
      const hasReview = (STATE.reviewsByPlace[p.id]||[]).some(r=>r.pastryKey===STATE.pastryFilter);
      if(!(a?.state === "yes" || hasReview)) return false;
    }
    if(q){
      return (p.name.toLowerCase().includes(q) ||
              (p.address||"").toLowerCase().includes(q));
    }
    return true;
  });
  if(STATE.sort==="name") out.sort((a,b)=>a.name.localeCompare(b.name,"it"));
  else if(STATE.sort==="score"){
    out.sort((a,b)=>{
      const sa = placeStats(a.id).avg, sb = placeStats(b.id).avg;
      if(sa===null && sb===null) return a.name.localeCompare(b.name,"it");
      if(sa===null) return 1;
      if(sb===null) return -1;
      return sb-sa;
    });
  }else if(STATE.sort==="reviews"){
    out.sort((a,b)=>placeStats(b.id).n - placeStats(a.id).n || a.name.localeCompare(b.name,"it"));
  }else if(STATE.sort==="recent"){
    out.sort((a,b)=>{
      const ra = STATE.reviewsByPlace[a.id]?.[0]?.ts || 0;
      const rb = STATE.reviewsByPlace[b.id]?.[0]?.ts || 0;
      return rb-ra;
    });
  }
  return out;
}

function renderList(){
  const places = filteredPlaces();
  const container = document.getElementById("list");
  if(!places.length){
    container.innerHTML = `<div class="empty">Nessun locale trovato</div>`;
    return;
  }
  container.innerHTML = places.map(p=>{
    const st = placeStats(p.id);
    const scoreHtml = st.avg!==null
      ? `<span class="score-num">${st.avg.toFixed(1)}</span><span class="score-n">· ${st.n} ${st.n===1?"recensione":"recensioni"}</span>`
      : `<span class="score-num none">nessuna recensione</span>`;
    return `
      <div class="item${STATE.selected?.id===p.id?' active':''}" data-id="${p.id}">
        <div class="item-head">
          <div class="item-name">${escapeHtml(p.name)}</div>
          <div class="item-cat">${CAT_ICON[p.category]} ${CAT_LABEL[p.category]}</div>
        </div>
        ${p.address? `<div class="item-addr">${escapeHtml(p.address)}</div>` : ''}
        <div class="item-score">${scoreHtml}</div>
      </div>
    `;
  }).join("");

  // conta
  document.getElementById("cnt-all").textContent = `· ${PLACES.length}`;

  // click
  container.querySelectorAll(".item").forEach(el=>{
    el.addEventListener("click",()=>{
      const p = PLACES.find(x=>x.id===el.dataset.id);
      if(p){ openPlace(p); flyTo(p) }
    });
  });
}

// ====== MAPPA ======
let map, markers = [];

function initMap(){
  map = new maplibregl.Map({
    container:"map",
    style:{
      version:8,
      sources:{
        osm:{type:"raster",tiles:["https://tile.openstreetmap.org/{z}/{x}/{y}.png"],tileSize:256,attribution:"© OpenStreetMap contributors"}
      },
      layers:[{id:"osm",type:"raster",source:"osm"}]
    },
    center:[11.8767, 45.4064],
    zoom:13.5,
    minZoom:11, maxZoom:19,
  });
  map.addControl(new maplibregl.NavigationControl({showCompass:false}),"bottom-right");
  map.addControl(new maplibregl.AttributionControl({compact:true}));
  map.on("load", refreshMarkers);
}

function refreshMarkers(){
  markers.forEach(m=>m.remove());
  markers = [];
  const visible = filteredPlaces();
  for(const p of visible){
    const st = placeStats(p.id);
    const el = document.createElement("div");
    const rated = st.n>0;
    const isCustom = p.source === "user";
    el.className = "mk "+p.category+(rated?" rated":"")+(isCustom?" custom":"");
    // wrapper interno: tutti gli stili visivi e animazioni vivono qui,
    // l'esterno resta neutro perche' MapLibre lo posiziona via transform.
    const body = document.createElement("div");
    body.className = "mk-body";
    body.innerHTML = rated
      ? `<span style="color:#fff;font-size:9px">${CAT_ICON[p.category]}</span><span class="badge">${st.avg.toFixed(1)}</span>`
      : `<span style="color:#fff;font-size:9px">${CAT_ICON[p.category]}</span>`;
    el.appendChild(body);
    if(isCustom) el.title = `Aggiunto da ${p.addedBy?.name || "utente"}`;
    el.addEventListener("click",(e)=>{
      e.stopPropagation();
      openPlace(p);
    });
    const m = new maplibregl.Marker({element:el, anchor:"center"})
      .setLngLat([p.lon, p.lat])
      .addTo(map);
    markers.push(m);
  }
}

function flyTo(p){
  if(!map) return;
  map.flyTo({center:[p.lon, p.lat], zoom:16, speed:1.2, essential:true});
}

      <div class="score-meta">
        <h4>Nessuna recensione</h4>

  // raggruppa recensioni per pastina
  const byPastry = {};
  for(const r of revs){
    const pk = r.pastryKey || "_legacy";
    (byPastry[pk] = byPastry[pk] || []).push(r);
  }
  const pastryOrder = Object.keys(byPastry).sort((a,b)=>{
    return (byPastry[b].length - byPastry[a].length) ||
           (byPastry[b][0].ts - byPastry[a][0].ts);

  const reviewsHtml = revs.length ? pastryOrder.map(pk=>{
    const arr = byPastry[pk];
    const past = pk==="_legacy" ? {name:"Recensione (versione precedente)", emoji:"📝"} : (getPastry(pk) || {name:pk, emoji:"❔"});
    const pastryAvg = arr.reduce((a,b)=>a+b.score,0)/arr.length;
    return `
      <div class="pastry-block">

          <span class="pastry-emoji">${past.emoji}</span>

function renderAvailabilityGrid(p){
  const pastries = allPastries();
  const rows = pastries.map(past=>{
    const a = getAvailability(p.id, past.key);
    const state = a?.state || "unknown";
    const meta = a ? `<span class="avail-by">segnalato da ${escapeHtml(a.userName)}</span>` : '';
    const stats = (placeStats(p.id).byPastry||{})[past.key];
    const ratingBadge = stats ? `<span class="avail-rating">${stats.avg.toFixed(1)} <span>· ${stats.n}</span></span>` : '';
    const isCustom = past.custom;
    const canDelete = isCustom && STATE.currentUser && past.addedBy?.id === STATE.currentUser.id;
    return `
      <div class="avail-row" data-past="${past.key}">
        <div class="avail-left">
          <span class="avail-emoji">${past.emoji}</span>
          <div class="avail-info">
            <b>${escapeHtml(past.name)}${isCustom?' <span class="avail-custom" title="aggiunta da '+escapeHtml(past.addedBy?.name||'utente')+'">✱</span>':''}</b>
            ${past.desc?`<span>${escapeHtml(past.desc)}</span>`:''}
            ${meta}
          </div>
          ${ratingBadge}
        </div>
        <div class="avail-toggles" data-past="${past.key}">
          <button class="avail-btn yes ${state==='yes'?'on':''}"     data-state="yes"     title="Hanno questa pastina">✓</button>
          <button class="avail-btn no  ${state==='no'?'on':''}"      data-state="no"      title="Non l'hanno">✗</button>
          <button class="avail-btn unk ${state==='unknown'?'on':''}" data-state="unknown" title="Non lo so">?</button>
          ${canDelete?`<button class="avail-del" data-del="${past.key}" title="Elimina questa pastina dall'elenco">🗑</button>`:''}
        </div>

    `;
  }).join("");

  const canAdd = !!STATE.currentUser;
  return `
    <div class="avail-grid">
      <div class="avail-head">
        <h3>Quali pastine trovi qui?</h3>
        <p class="avail-sub">Segnala quali pastine sono disponibili in questo locale. La tua segnalazione aiuta gli altri.</p>
      </div>
      ${rows}
      ${canAdd ? `
        <div class="avail-addrow">
          <button class="addpastrybtn" onclick="showAddPastry('${p.id}')">＋ Proponi un'altra pastina della tradizione</button>
        </div>
      ` : ''}

}

function bindAvailabilityGrid(p){
  document.querySelectorAll(".avail-toggles").forEach(group=>{
    const past = group.dataset.past;
    group.querySelectorAll(".avail-btn").forEach(btn=>{
      btn.addEventListener("click", async ()=>{
        if(!STATE.currentUser){ showLogin(); return }
        const state = btn.dataset.state;
        await setAvailability(p.id, past, state);
        // re-render solo del modal
        openPlace(p);
      });
    });
    const del = group.querySelector(".avail-del");
    if(del){
      del.addEventListener("click", async ()=>{
        await deleteCustomPastry(del.dataset.del);
        openPlace(p);
      });
    }
  });
}

function renderForm(p){
  const myRevs = (STATE.reviewsByPlace[p.id] || []).filter(r=>r.userId===STATE.currentUser.id);
  // pastine disponibili in questo locale (segnalate "yes" o già recensite)
  const availPastries = allPastries().filter(past=>{
    const a = getAvailability(p.id, past.key);
    if(a?.state === "yes") return true;
    // includi anche quelle che qualcuno ha già recensito
    if(STATE.reviewsByPlace[p.id]?.some(r=>r.pastryKey===past.key)) return true;
    return false;
  });
  // se nessuna è marcata disponibile, mostro tutte
  const pastriesForSelect = availPastries.length ? availPastries : allPastries();

  // pre-seleziono la prima non ancora recensita dall'utente, altrimenti la prima
  const reviewedKeys = new Set(myRevs.map(r=>r.pastryKey));
  const initial = pastriesForSelect.find(p=>!reviewedKeys.has(p.key)) || pastriesForSelect[0];
  const initialKey = initial?.key || "";

  const pastryOptions = pastriesForSelect.map(past=>{
    const reviewed = reviewedKeys.has(past.key);
    return `<option value="${past.key}"${past.key===initialKey?' selected':''}>${past.emoji} ${escapeHtml(past.name)}${reviewed?' · (già recensita, sarà aggiornata)':''}</option>`;
  }).join("");

  const myFor = (key) => myRevs.find(r=>r.pastryKey===key);
  const mineNow = myFor(initialKey);
  const vals = mineNow ? mineNow.crits : {};
  const txt = mineNow ? mineNow.text : "";

  const critInputs = CRITERIA.map(c=>{
    const v = vals[c.key] ?? 7;
    return `
      <div class="crit">
        <div class="crit-label">
          <b>${c.label}</b>
          <span class="crit-val" id="val-${c.key}">${(typeof v==='number'?v:7).toFixed(1)}</span>
        </div>
        ${c.desc?`<div style="font-size:11px;color:var(--ink-soft);margin-bottom:5px">${c.desc}</div>`:''}
        <input class="slider" type="range" min="0" max="10" step="0.5" value="${v}" data-crit="${c.key}"/>
      </div>
    `;
  }).join("");

  return `
    <div class="formbox" id="formbox">
      <h3>Recensisci una pastina</h3>
      <div class="field">
        <label>Quale pastina stai recensendo?</label>
        <select id="rev-pastry" class="pastry-select">${pastryOptions}</select>
        <div class="hint" id="rev-pastry-hint">${initial?.desc?escapeHtml(initial.desc):''}</div>
      </div>
      <div id="rev-crits-area">
        ${critInputs}
        <textarea class="textfield" id="rev-text" placeholder="com'era? ripieno, sfoglia, presentazione...">${escapeHtml(txt)}</textarea>
      </div>
      <div class="photoinput">
        <label for="rev-photo">📷 Aggiungi foto</label>
        <input type="file" id="rev-photo" accept="image/*" multiple/>
        <div id="photo-previews" style="display:flex;gap:6px;flex-wrap:wrap"></div>
      </div>
      <button class="btn-submit" id="rev-submit">${mineNow?"Aggiorna recensione":"Pubblica recensione"}</button>
    </div>
  `;
}

let pendingPhotos = [];
function bindForm(p){
  pendingPhotos = [];
  const box = document.getElementById("formbox");
  if(!box) return;

  // sliders
  const bindSliders = ()=>{
    box.querySelectorAll(".slider").forEach(sl=>{
      sl.addEventListener("input", ()=>{
        document.getElementById("val-"+sl.dataset.crit).textContent = parseFloat(sl.value).toFixed(1);
      });
    });
  };
  bindSliders();

  // cambio pastina nel selector → aggiorna i valori se l'utente ne ha già una
  const sel = document.getElementById("rev-pastry");
  sel?.addEventListener("change", ()=>{
    const key = sel.value;
    const past = getPastry(key);
    document.getElementById("rev-pastry-hint").textContent = past?.desc || '';
    const myRevs = (STATE.reviewsByPlace[p.id] || []).filter(r=>r.userId===STATE.currentUser.id);
    const mine = myRevs.find(r=>r.pastryKey===key);
    // ri-render dei criteri
    const vals = mine?.crits || {};
    const txt = mine?.text || "";
    const critInputs = CRITERIA.map(c=>{
      const v = vals[c.key] ?? 7;
      return `
        <div class="crit">
          <div class="crit-label">
            <b>${c.label}</b>
            <span class="crit-val" id="val-${c.key}">${(typeof v==='number'?v:7).toFixed(1)}</span>
          </div>
          ${c.desc?`<div style="font-size:11px;color:var(--ink-soft);margin-bottom:5px">${c.desc}</div>`:''}
          <input class="slider" type="range" min="0" max="10" step="0.5" value="${v}" data-crit="${c.key}"/>
        </div>
      `;
    }).join("");
    document.getElementById("rev-crits-area").innerHTML = critInputs +
      `<textarea class="textfield" id="rev-text" placeholder="com'era? ripieno, sfoglia, presentazione...">${escapeHtml(txt)}</textarea>`;
    document.getElementById("rev-submit").textContent = mine?"Aggiorna recensione":"Pubblica recensione";
    bindSliders();
  });

  // photo handling
  const fileInput = document.getElementById("rev-photo");
  const previews = document.getElementById("photo-previews");
  fileInput?.addEventListener("change", async (e)=>{
    for(const f of e.target.files){
      try{
        const data = await compressImage(f, 800, 0.75);
        pendingPhotos.push(data);
        const img = document.createElement("img");
        img.src = data; img.className = "thumb";
        img.title = "clicca per rimuovere";
        img.addEventListener("click",()=>{
          const idx = pendingPhotos.indexOf(data);
          if(idx>=0) pendingPhotos.splice(idx,1);
          img.remove();
        });
        previews.appendChild(img);
      }catch(err){ console.warn(err); toast("Foto non caricata") }
    }
    fileInput.value = "";
  });

  // submit
  document.getElementById("rev-submit")?.addEventListener("click", async ()=>{
    const pastryKey = document.getElementById("rev-pastry").value;
    if(!pastryKey){ toast("Scegli una pastina"); return }
    const crits = {};
    document.querySelectorAll("#rev-crits-area .slider").forEach(sl=> crits[sl.dataset.crit] = parseFloat(sl.value));
    const score = Object.values(crits).reduce((a,b)=>a+b,0) / CRITERIA.length;
    const text = document.getElementById("rev-text").value.trim();
    // se l'utente ha già recensito QUESTA pastina, sostituisci
    const myRevs = (STATE.reviewsByPlace[p.id] || []).filter(r=>r.userId===STATE.currentUser.id);
    const mine = myRevs.find(r=>r.pastryKey===pastryKey);
    if(mine) await sdel(`review:${p.id}:${mine.id}`, true);
    const ok = await saveReview(p.id, {pastryKey, crits, score, text, photos: pendingPhotos});
    if(ok){
      toast(mine?"Recensione aggiornata":"Recensione pubblicata!");
      pendingPhotos = [];
      refreshMarkers();
      openPlace(p);
    }
  });
}

function renderReview(r){
  const d = new Date(r.ts).toLocaleDateString("it-IT",{day:"numeric",month:"long",year:"numeric"});
  const critLine = CRITERIA.map(c=>{
    const v = r.crits?.[c.key];
    return v!==undefined ? `<span>${c.label.toLowerCase()} <b>${v.toFixed(1)}</b></span>` : '';
  }).filter(Boolean).join("");
  const canDel = STATE.currentUser && STATE.currentUser.id === r.userId;
  const photos = (r.photos||[]).map(ph=>
    `<img src="${ph}" onclick="viewImage('${ph.replace(/'/g,"\\'")}')"/>`
  ).join("");
  const initial = r.userName.slice(0,1).toUpperCase();
  return `
    <div class="review">
      <div class="review-head">
        <div class="review-author"><span class="av">${initial}</span>${escapeHtml(r.userName)}<span class="review-date">· ${d}</span></div>
        <div class="review-score">${r.score.toFixed(1)}<span style="font-size:11px;color:var(--ink-soft);font-family:'Inter Tight';font-weight:400">/10</span></div>

      ${canDel? `<button class="delbtn" onclick='deleteReviewById("${r.id}","${r.placeId}")'>elimina</button>` : ''}

}

function startPicking(){
  // chiudi temporaneamente il modal e mostra la mappa per pickare
  const overlay = document.getElementById("overlay");
  if(overlay) overlay.style.display = "none";
  document.getElementById("map").classList.add("picking");
  if(pickerMarker){ pickerMarker.remove(); pickerMarker = null }
  pickerHandler = (e)=>{
    const {lng, lat} = e.lngLat;
    pickedCoord = {lat, lon:lng};
    if(pickerMarker) pickerMarker.remove();
    const el = document.createElement("div");
    el.className = "pickmarker";
    const pin = document.createElement("div");
    pin.className = "pin";
    el.appendChild(pin);
    pickerMarker = new maplibregl.Marker({element:el, anchor:"bottom"})
      .setLngLat([lng, lat])
      .addTo(map);
    // riapri il modal e aggiorna
    document.getElementById("map").classList.remove("picking");
    map.off("click", pickerHandler);
    pickerHandler = null;
    if(overlay) overlay.style.display = "";
    updateCoordDisplay();
    // ricontrolla duplicati
    const ev = new Event("input");
    document.getElementById("ap-name")?.dispatchEvent(ev);
  };
  map.on("click", pickerHandler);
  // ESC annulla
  const escHandler = (e)=>{
    if(e.key==="Escape"){
      stopPicking();
      if(overlay) overlay.style.display = "";
      window.removeEventListener("keydown", escHandler);
    }
  };
  window.addEventListener("keydown", escHandler);
}

function stopPicking(){
  if(pickerHandler){ map.off("click", pickerHandler); pickerHandler = null }
  document.getElementById("map").classList.remove("picking");
}

function updateCoordDisplay(){
  const el = document.getElementById("ap-coord");
  if(!el) return;
  if(pickedCoord){
    el.classList.remove("empty");
    el.innerHTML = `
      <span style="flex:1">📍 <b>${pickedCoord.lat.toFixed(5)}, ${pickedCoord.lon.toFixed(5)}</b></span>
      <button class="pickbtn" onclick="startPicking()">Cambia</button>
    `;
  }else{
    el.classList.add("empty");
    el.innerHTML = `
      <span style="flex:1">Nessuna posizione selezionata</span>
      <button class="pickbtn" id="ap-pick" onclick="startPicking()">📍 Scegli sulla mappa</button>
    `;
  }
}

function showRanking(pastryFilter=null){
  const cat = STATE.filter;
  const scope = cat==="all" ? PLACES : PLACES.filter(p=>p.category===cat);

  // se è specificata una pastina, classifica per quella pastina
  // altrimenti classifica complessiva del locale
  let ranked;
  let title, subtitle;
  if(pastryFilter){
    const past = getPastry(pastryFilter);
    ranked = scope.map(p=>{
      const st = placeStats(p.id);
      const pastryStat = st.byPastry?.[pastryFilter];
      return {p, n: pastryStat?.n||0, avg: pastryStat?.avg||null};
    }).filter(x=>x.n > 0).sort((a,b)=>b.avg - a.avg || b.n - a.n);
    title = `Migliori ${past?.name || 'pastine'} di Padova`;
    subtitle = `${past?.emoji||''} classifica dedicata · ${ranked.length} ${ranked.length===1?'locale':'locali'} con recensioni`;
  }else{
    ranked = scope.map(p=>{
      const st = placeStats(p.id);
      return {p, n:st.n, avg:st.avg};
    }).filter(x=>x.n > 0).sort((a,b)=>b.avg - a.avg || b.n - a.n);
    const scopeLabel = cat==="all" ? "tutte le categorie" : CAT_LABEL[cat].toLowerCase()+"i";
    title = "Le migliori pastine di Padova";
    subtitle = `Filtro: <b>${scopeLabel}</b> · classifica complessiva`;
  }

  // Selettore pastina
  const pastryOptions = `
    <option value="">⭐ Classifica complessiva del locale</option>
    ${allPastries().map(past=>{
      // mostra quante recensioni in totale per quella pastina
      const totRev = STATE.allReviews.filter(r=>r.pastryKey===past.key).length;
      return `<option value="${past.key}"${past.key===pastryFilter?' selected':''}${totRev===0?' disabled':''}>${past.emoji} ${escapeHtml(past.name)}${totRev?` (${totRev})`:' (nessuna recensione)'}</option>`;
    }).join("")}
  `;

  const html = `
    <div class="modal-head">
      <button class="closex" onclick="closeModal()">×</button>
      <div class="kicker">Classifica pastinòmetro</div>
      <h2>${title}</h2>
      <div class="meta">${subtitle}</div>
    </div>
    <div class="modal-body">
      <div class="field" style="margin-bottom:18px">
        <label>Classifica per</label>
        <select id="rank-pastry-sel" class="pastry-select">${pastryOptions}</select>
      </div>
      ${ranked.length===0 ? `<div class="empty">Ancora nessuna recensione qui.<br/>Aggiungine una per iniziare la classifica.</div>` :
        `<div class="podium">
          ${ranked.map((x,i)=>`
            <div class="rank-item" data-id="${x.p.id}">
              <div class="rank-n ${i<3?'gold':''}">${i+1}</div>
              <div class="rank-info">
                <b>${escapeHtml(x.p.name)}</b>
                <span>${CAT_ICON[x.p.category]} ${CAT_LABEL[x.p.category]}${x.p.address?' · '+escapeHtml(x.p.address):''}</span>
              </div>
              <div class="rank-score">${x.avg.toFixed(1)}<span>${x.n} ${x.n===1?'rec.':'recc.'}</span></div>
            </div>
          `).join("")}
        </div>`}
    </div>
  `;
  openModal(html);
  document.getElementById("rank-pastry-sel")?.addEventListener("change", (e)=>{
    showRanking(e.target.value || null);
  });
  document.querySelectorAll(".rank-item").forEach(el=>{
    el.addEventListener("click",()=>{
      const p = PLACES.find(x=>x.id===el.dataset.id);
      if(p){ closeModal(); openPlace(p); flyTo(p) }
    });
  });
}

// ====== UTIL ======
function escapeHtml(s){
  if(s==null) return "";
  return String(s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"})[c]);
}
function escapeAttr(s){ return escapeHtml(s) }

async function compressImage(file, maxDim=800, quality=0.75){
  return new Promise((resolve, reject)=>{
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = ()=>{
      URL.revokeObjectURL(url);
      let {width,height} = img;
      if(width>height && width>maxDim){ height = height*maxDim/width; width = maxDim }
      else if(height>maxDim){ width = width*maxDim/height; height = maxDim }
      const cv = document.createElement("canvas");
      cv.width = width; cv.height = height;
      cv.getContext("2d").drawImage(img,0,0,width,height);
      resolve(cv.toDataURL("image/jpeg", quality));
    };
    img.onerror = reject;
    img.src = url;
  });
}

document.getElementById("rank-btn").addEventListener("click", ()=>showRanking());
document.getElementById("add-btn").addEventListener("click", showAddPlace);
document.getElementById("pastry-filter").addEventListener("change",(e)=>{
  STATE.pastryFilter = e.target.value || null;
  document.querySelector(".pastry-filter-row").classList.toggle("active", !!STATE.pastryFilter);
  renderList();
  refreshMarkers();
});
window.addEventListener("keydown", (e)=>{ if(e.key==="Escape") closeModal() });

function populatePastryFilter(){
  const sel = document.getElementById("pastry-filter");
  if(!sel) return;
  const cur = sel.value;
  sel.innerHTML = `<option value="">— qualsiasi pastina —</option>` +
    allPastries().map(past=>{
      // conta in quanti locali è marcata "yes" o ha recensioni
      let n = 0;
      for(const p of PLACES){
        const a = getAvailability(p.id, past.key);
        const has = (STATE.reviewsByPlace[p.id]||[]).some(r=>r.pastryKey===past.key);
        if(a?.state==="yes" || has) n++;
      }
      return `<option value="${past.key}"${n===0?' disabled':''}>${past.emoji} ${escapeHtml(past.name)}${n?` (${n})`:''}</option>`;
    }).join("");
  sel.value = cur;
}

// ====== AVVIO ======
(async function(){
  await loadUser();
  await loadCustomPlaces();
  await loadCategoryOverrides();
  await loadCustomPastries();
  await loadAvailability();
  await loadReviews();
  initMap();
  renderList();
  populatePastryFilter();
})();
</script>
